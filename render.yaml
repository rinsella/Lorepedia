services:
  - type: web
    name: lorepedia
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lorepedia-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false

databases:
  - name: lorepedia-db
    databaseName: lorepedia
    plan: starter
