version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lorepedia
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/lorepedia
      NEXTAUTH_URL: ${APP_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@lorepedia.net}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-ChangeThisImmediately123!}
      STORAGE_DRIVER: local
      LOCAL_UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

  # Optional S3-compatible storage. Uncomment and set STORAGE_DRIVER=s3 to use.
  # minio:
  #   image: minio/minio
  #   command: server /data --console-address ":9001"
  #   ports:
  #     - "9000:9000"
  #     - "9001:9001"
  #   environment:
  #     MINIO_ROOT_USER: minioadmin
  #     MINIO_ROOT_PASSWORD: minioadmin
  #   volumes:
  #     - minio_data:/data

volumes:
  db_data:
  uploads:
  # minio_data:
